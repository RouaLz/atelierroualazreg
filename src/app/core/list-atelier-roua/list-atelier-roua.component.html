<div class="container" style="padding: 30px; font-family: 'Poppins', sans-serif; background-color: #f4f7f6; min-height: 100vh;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
    <h2 style="color: white; margin: 0; font-weight: 600; letter-spacing: 1px;">✨ Ateliers Roua Lazreg</h2>
    <button (click)="openForm()" *ngIf="!showForm" 
            style="background: white; color: #764ba2; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
      + Nouveau Atelier
    </button>
  </div>

  <div *ngIf="showForm" style="background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 5px solid #667eea; animation: slideDown 0.4s ease-out;">
    <h3 style="color: #4a5568; margin-top: 0; margin-bottom: 25px; display: flex; align-items: center;">
      <span style="background: #e2e8f0; border-radius: 50%; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; margin-right: 10px;">📝</span>
      {{ isEditing ? 'Modifier l\'atelier' : 'Créer un nouvel atelier' }}
    </h3>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div class="form-group">
        <label style="display: block; font-weight: 600; margin-bottom: 8px; color: #4a5568;">Nom de l'atelier</label>
        <input [(ngModel)]="selected!.nom" placeholder="Nom de l'atelier" style="width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; outline: none; transition: border-color 0.3s;">
      </div>

      <div class="form-group">
        <label style="display: block; font-weight: 600; margin-bottom: 8px; color: #4a5568;">Email Formateur</label>
        <input type="email" [(ngModel)]="selected!.emailFormateur" placeholder="formateur@exemple.com" style="width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px;">
      </div>

      <div class="form-group">
        <label style="display: block; font-weight: 600; margin-bottom: 8px; color: #4a5568;">Participants</label>
        <input type="number" [(ngModel)]="selected!.nbrParticipant" style="width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px;">
      </div>

      <div style="display: flex; align-items: center; padding-top: 30px;">
        <label style="display: flex; align-items: center; cursor: pointer; font-weight: 600; color: #4a5568;">
          <input type="checkbox" [(ngModel)]="selected!.statut" style="width: 20px; height: 20px; margin-right: 10px; accent-color: #667eea;">
          Atelier Actif
        </label>
      </div>
    </div>

    <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: flex-end;">
      <button (click)="save()" style="background: #48bb78; color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-weight: 600;">Enregistrer</button>
      <button (click)="closeForm()" style="background: #edf2f7; color: #4a5568; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-weight: 600;">Annuler</button>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;">
    
    <div *ngFor="let item of liste" style="background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.3s, box-shadow 0.3s; border: 1px solid #edf2f7; position: relative;">
      
      <div [style.background]="item.statut ? '#c6f6d5' : '#fed7d7'" 
           [style.color]="item.statut ? '#22543d' : '#822727'"
           style="position: absolute; top: 15px; right: 15px; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase;">
        {{ item.statut ? 'Actif' : 'Inactif' }}
      </div>

      <div style="padding: 25px;">
        <div style="background: #ebf4ff; width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; font-size: 1.5rem;">🎨</div>
        <h4 style="margin: 0 0 10px 0; color: #2d3748; font-size: 1.25rem;">{{ item.nom }}</h4>
        <p style="color: #718096; margin: 0 0 5px 0; font-size: 0.9rem;">📧 {{ item.emailFormateur }}</p>
        <p style="color: #718096; margin: 0; font-size: 0.9rem;">👥 <strong>{{ item.nbrParticipant }}</strong> participants</p>
      </div>

      <div style="background: #f8fafc; padding: 15px 25px; display: flex; justify-content: space-between; border-top: 1px solid #edf2f7;">
        <button (click)="openForm(item)" style="background: none; border: none; color: #3182ce; font-weight: 600; cursor: pointer; display: flex; align-items: center;">
          <span style="margin-right: 5px;">✏️</span> Modifier
        </button>
        <button (click)="delete(item.id!)" style="background: none; border: none; color: #e53e3e; font-weight: 600; cursor: pointer; display: flex; align-items: center;">
          <span style="margin-right: 5px;">🗑️</span> Supprimer
        </button>
      </div>
    </div>

  </div>

  <div *ngIf="liste.length === 0" style="text-align: center; padding: 100px 0; color: #a0aec0;">
    <div style="font-size: 4rem; margin-bottom: 20px;">📭</div>
    <h3>Aucun atelier trouvé</h3>
    <p>Cliquez sur le bouton en haut pour commencer.</p>
  </div>

</div>
